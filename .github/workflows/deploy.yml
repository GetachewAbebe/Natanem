name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual deploys from the Actions tab

# Never run two deploys at once; a new push waits for the current deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # TEMPORARY diagnostic — prints only the secret's length and format
      # category (never the key itself). Remove once the secret is confirmed.
      - name: Diagnose secret
        env:
          K: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          echo "secret raw length: ${#K}"
          case "$K" in
            b3BlbnNz*) echo "format: base64 of an OpenSSH key (expected) - GOOD" ;;
            "-----BEGIN"*) echo "format: raw PEM key" ;;
            "") echo "format: EMPTY — the workflow is reading a different/empty secret (scope issue)" ;;
            *) echo "format: unexpected (neither base64-magic nor PEM header)" ;;
          esac
          DEC=$(printf '%s' "$K" | tr -d '\r\n' | base64 -d 2>/dev/null | wc -c)
          echo "base64-decoded byte count: $DEC (a valid key decodes to ~3381)"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (standalone bundle)
        run: npm run build
        env:
          STANDALONE: "1"
          # Build-time placeholders only. The real values are set as
          # environment variables in cPanel's "Setup Node.js App" and are
          # read at runtime — they are never baked into the bundle.
          PAYLOAD_SECRET: build-time-placeholder
          DATABASE_URI: file:./payload.db

      - name: Assemble deploy bundle
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          # cPanel/CloudLinux manages node_modules as a symlink into its
          # virtual environment — never ship a real one.
          rm -rf deploy/node_modules
          mkdir -p deploy/.next/static deploy/public
          cp -r .next/static/. deploy/.next/static/
          cp -r public/. deploy/public/
          rm -f deploy/payload.db deploy/.env

      - name: Set up SSH
        env:
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # The CPANEL_SSH_KEY secret may be stored base64-encoded (single line)
          # or as the raw private key. Accept either.
          printf '%s' "$CPANEL_SSH_KEY" | tr -d '\r' > /tmp/key_in
          if base64 -d /tmp/key_in > ~/.ssh/deploy_key 2>/dev/null \
             && ssh-keygen -y -f ~/.ssh/deploy_key < /dev/null > /dev/null 2>&1; then
            echo "Loaded base64-encoded key."
          else
            cp /tmp/key_in ~/.ssh/deploy_key
            echo "Using raw key."
          fi
          rm -f /tmp/key_in
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key < /dev/null > /dev/null 2>&1; then
            echo "::error::CPANEL_SSH_KEY is not a valid private key (tried base64 and raw). Re-add the secret."
            exit 1
          fi
          # Best effort — the SSH steps also auto-accept the host key.
          ssh-keyscan -p "$CPANEL_SSH_PORT" "$CPANEL_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload to server
        # The server has no rsync, so stream a tar archive over SSH. Only code
        # artifacts (.next, public, server.js, package.json) are replaced.
        # node_modules (a cPanel-managed symlink), payload.db, media/ and tmp/
        # are never removed or shipped — so live content is always preserved.
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p ${{ secrets.CPANEL_SSH_PORT }} ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}"
          rm -rf deploy/media deploy/tmp
          $SSH "mkdir -p ~/natanem-web && cd ~/natanem-web && rm -rf .next public server.js"
          tar czf - -C deploy . | $SSH "tar xzf - -C ~/natanem-web"

      - name: Install deps & restart
        # Ensure the CloudLinux node_modules symlink exists, install production
        # deps (correct Linux native binaries) into the managed venv, restart.
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p ${{ secrets.CPANEL_SSH_PORT }} ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}"
          $SSH '
            set -e
            APP="$HOME/natanem-web"
            VER=$(ls "$HOME/nodevenv/natanem-web/" | head -1)
            VENV_MODULES="$HOME/nodevenv/natanem-web/$VER/lib/node_modules"
            if [ ! -L "$APP/node_modules" ]; then
              rm -rf "$APP/node_modules"
              mkdir -p "$VENV_MODULES"
              ln -sfn "$VENV_MODULES" "$APP/node_modules"
            fi
            source "$HOME/nodevenv/natanem-web/$VER/bin/activate"
            cd "$APP"
            npm install --omit=dev --no-audit --no-fund
            mkdir -p tmp && touch tmp/restart.txt
          '
