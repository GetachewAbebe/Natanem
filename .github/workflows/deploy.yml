name: Build & publish for cPanel

# Builds the site on GitHub (Linux — correct native binaries) and publishes the
# ready-to-run bundle to the `production` branch. The cPanel server pulls that
# branch via cron, so deployment uses only OUTBOUND connections from the server
# — the host firewall (which blocks inbound SSH from datacenter IPs) is never
# in the path.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-publish
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (standalone bundle)
        run: npm run build
        env:
          STANDALONE: "1"
          # Build-time placeholders only — real values live in cPanel's
          # "Setup Node.js App" environment and are read at runtime.
          PAYLOAD_SECRET: build-time-placeholder
          DATABASE_URI: file:./payload.db

      - name: Assemble deploy bundle
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          # node_modules is managed by cPanel (a symlink into its venv) and
          # payload.db / media are live server content — never ship them.
          rm -rf deploy/node_modules
          mkdir -p deploy/.next/static deploy/public
          cp -r .next/static/. deploy/.next/static/
          cp -r public/. deploy/public/
          rm -f deploy/payload.db deploy/.env
          rm -rf deploy/media deploy/tmp

      - name: Publish bundle to the production branch
        run: |
          cd deploy
          git init -q -b production
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Build ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" production
          echo "Published build to the production branch."
